services:
  postgres:
    image: postgres:15-alpine
    container_name: report-collector-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-report_collector}
      POSTGRES_USER: ${POSTGRES_USER:-rcuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rcpassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rcuser} -d ${POSTGRES_DB:-report_collector}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
